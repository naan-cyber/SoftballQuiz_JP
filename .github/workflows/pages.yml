name: Build and Deploy Flet Web App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

jobs:
  build:
    name: Publish web app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Publish Flet web app
        shell: bash
        run: |
          rm -rf .pages-app build/web
          mkdir -p .pages-app
          cp main.py .pages-app/
          cp -R softball_quiz .pages-app/
          find .pages-app -type d -name __pycache__ -prune -exec rm -rf {} +

          FLET_VERSION="$(uv run --locked python -c 'import flet; print(flet.__version__)')"
          cat > .pages-app/pyproject.toml <<EOF
          [project]
          name = "softball-next-play-quiz"
          version = "0.1.0"
          requires-python = ">=3.10"
          dependencies = ["flet==${FLET_VERSION}"]
          EOF

          uv run --locked flet publish .pages-app/main.py --distpath "$PWD/build/web" --base-url "${GITHUB_REPOSITORY#*/}" --route-url-strategy hash
          cp robots.txt build/web/robots.txt
          find build/web -type f \( -name "*.map" -o -name "*.symbols" \) -delete

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web
          name: web-build-artifact
          retention-days: 20

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: web-build-artifact
